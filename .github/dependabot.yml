version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    cooldown:
      default-days: 3
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "eslint"
        update-types:
          - version-update:semver-major
    groups:
      all:
        update-types:
          - "patch"
          - "minor"
